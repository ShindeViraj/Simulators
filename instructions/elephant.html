<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive 3D Elephant</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f0f0; }
        canvas { display: block; }
        #info {
            position: absolute; top: 10px; width: 100%; text-align: center;
            font-family: sans-serif; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">Left Click: Rotate | Right Click: Pan | Scroll: Zoom</div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Setup Scene, Camera, Renderer
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue
        scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(5, 5, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 2. Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 3. Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a9d23 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // 4. Build the Elephant (using primitive shapes)
        const elephantGroup = new THREE.Group();

        const skinMaterial = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8 });

        // Body
        const bodyGeo = new THREE.BoxGeometry(2.5, 2, 3.5);
        const body = new THREE.Mesh(bodyGeo, skinMaterial);
        body.position.y = 2.5;
        body.castShadow = true;
        elephantGroup.add(body);

        // Head
        const headGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        const head = new THREE.Mesh(headGeo, skinMaterial);
        head.position.set(0, 3, 2.2);
        head.castShadow = true;
        elephantGroup.add(head);

        // Trunk
        const trunkGeo = new THREE.CylinderGeometry(0.2, 0.5, 2, 8);
        const trunk = new THREE.Mesh(trunkGeo, skinMaterial);
        trunk.rotation.x = Math.PI / 4;
        trunk.position.set(0, 2.5, 3.2);
        trunk.castShadow = true;
        elephantGroup.add(trunk);

        // Legs
        const legGeo = new THREE.CylinderGeometry(0.4, 0.4, 2, 16);
        const positions = [
            [-0.8, 1, 1.2], [0.8, 1, 1.2],  // Front legs
            [-0.8, 1, -1.2], [0.8, 1, -1.2] // Back legs
        ];

        positions.forEach(pos => {
            const leg = new THREE.Mesh(legGeo, skinMaterial);
            leg.position.set(...pos);
            leg.castShadow = true;
            elephantGroup.add(leg);
        });

        // Ears
        const earGeo = new THREE.BoxGeometry(1.5, 1, 0.1);
        const earL = new THREE.Mesh(earGeo, skinMaterial);
        earL.position.set(1, 3, 2);
        earL.rotation.y = -0.5;
        elephantGroup.add(earL);

        const earR = new THREE.Mesh(earGeo, skinMaterial);
        earR.position.set(-1, 3, 2);
        earR.rotation.y = 0.5;
        elephantGroup.add(earR);

        scene.add(elephantGroup);

        // 5. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
